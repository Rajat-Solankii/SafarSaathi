<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Bus Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 50px;
        }

        .role-selection {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .role-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none;
            flex: 1;
            min-width: 200px;
            max-width: 250px;
        }

        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .role-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .role-title {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .role-desc {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 600px) {
            .container {
                padding: 30px;
            }

            h1 {
                font-size: 2em;
            }

            .role-selection {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚌 Live Bus Tracking</h1>
        <p class="subtitle">Real-time bus location tracking for drivers and passengers</p>
        
        <div class="role-selection">
            <a href="/driver" class="role-card">
                <div class="role-icon">🚗</div>
                <div class="role-title">I'm a Driver</div>
                <div class="role-desc">Create routes and broadcast your location</div>
            </a>
            
            <a href="/passenger" class="role-card">
                <div class="role-icon">👤</div>
                <div class="role-title">I'm a Passenger</div>
                <div class="role-desc">Track your bus in real-time</div>
            </a>
        </div>
    </div>
</body>
</html>
